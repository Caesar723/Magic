<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Testing Lab</title>
  <link rel="shortcut icon" href="webpages/homepage/coin.png" type="image/x-icon" />
  <link rel="stylesheet" type="text/css" href="webpages/testing_area/testing.css">

  <script src="webpages/gaming_page/fundation_func.js"></script>
  <script src="webpages/gaming_page/timmer.js"></script>
  <script src="webpages/block.js"></script>
  <script src="webpages/gaming_page/hand.js"></script>
  <script src="webpages/card.js"></script>
  <script src="webpages/cards_main.js"></script>
  <script src="webpages/gaming_page/card_battle.js"></script>
  <script src="webpages/gaming_page/card_battle_main.js"></script>
  <script src="webpages/gaming_page/card_hand.js"></script>
  <script src="webpages/gaming_page/card_hand_main.js"></script>
  <script src="webpages/gaming_page/player.js"></script>
  <script src="webpages/gaming_page/table_block.js"></script>
  <script src="webpages/gaming_page/table.js"></script>
  <script src="webpages/button.js"></script>
  <script src="packet/math.min.js"></script>
  <script src="webpages/rotation.js"></script>
  <script src="webpages/gaming_page/action_bar.js"></script>
  <script src="webpages/gaming_page/animation.js"></script>
  <script src="webpages/gaming_page/mana_bar.js"></script>
  <script src="webpages/gaming_page/special_effects.js"></script>
  <script src="webpages/gaming_page/2D_show.js"></script>
  <script src="webpages/gaming_page/message_processor.js"></script>
  <script src="webpages/gaming_page/selection_page.js"></script>
  <script src="webpages/gaming_page/music_effect.js"></script>
  <script src="webpages/gaming_page/buff.js"></script>
  <script src="webpages/gaming_page/button.js"></script>
  <script src="webpages/gaming_page/gaming.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.0.0/crypto-js.min.js"></script>
</head>
<body class="testing-body">
  <div class="testing-root">
    <aside class="lab-drawer" id="labDrawer" data-open="false" aria-label="测试控制台">
      <div class="lab-rail">
        <button type="button" class="lab-rail-btn" id="labRailBtn" aria-expanded="false" aria-controls="labPanelInner" title="展开 / 收起">
          <span class="lab-rail-icon" aria-hidden="true">◈</span>
          <span class="lab-rail-label">LAB</span>
        </button>
      </div>
      <div class="lab-panel" id="labPanel">
        <div class="lab-panel-scroll" id="labPanelInner">
          <header class="lab-header">
            <h1>Testing Lab</h1>
            <p class="lab-sub">在对局中快速搭场景：补手牌、造生物、清场、补满法力。</p>
          </header>

          <section class="lab-section" aria-labelledby="sec-hand">
            <h2 class="lab-section-title" id="sec-hand">加入卡牌</h2>
            <p class="lab-mini-label" id="labDestLabel">目标区域</p>
            <div class="lab-seg lab-seg-three" role="group" aria-labelledby="labDestLabel">
              <button type="button" class="lab-dest-btn" data-dest="hand" data-active="true">手牌</button>
              <button type="button" class="lab-dest-btn" data-dest="library" data-active="false">牌库</button>
              <button type="button" class="lab-dest-btn" data-dest="graveyard" data-active="false">墓地</button>
            </div>
            <div class="lab-type-strip" id="labTypeStrip"></div>
            <div class="lab-card-grid" id="labCardGrid"></div>
            <p class="lab-hint">点选一张牌：加入 1 张到你当前角色所选区域（牌库加在牌库底侧）。</p>
          </section>

          <section class="lab-section" aria-labelledby="sec-creature">
            <h2 class="lab-section-title" id="sec-creature">生成生物</h2>
            <div class="lab-seg" role="group" aria-label="站位">
              <button type="button" class="lab-seg-self" data-side="self" data-active="true">我方场地</button>
              <button type="button" class="lab-seg-oppo" data-side="oppo" data-active="false">敌方场地</button>
            </div>
            <div class="lab-row">
              <div class="lab-field">
                <label for="labPower">力量</label>
                <input type="number" id="labPower" min="0" value="2" />
              </div>
              <div class="lab-field">
                <label for="labTough">耐力</label>
                <input type="number" id="labTough" min="1" value="2" />
              </div>
            </div>
            <div class="lab-keywords" id="labKeywords"></div>
            <button type="button" class="lab-btn lab-btn-primary" id="labSpawnBtn">在场上生成</button>
          </section>

          <section class="lab-section" aria-labelledby="sec-global">
            <h2 class="lab-section-title" id="sec-global">全局操作</h2>
            <button type="button" class="lab-btn lab-btn-muted" id="labClearHandBtn">清空手牌（置入墓地）</button>
            <button type="button" class="lab-btn lab-btn-muted" id="labResetLandCapBtn">重置下地次数上限</button>
            <button type="button" class="lab-btn lab-btn-muted" id="labUntapAllBtn">全部横置重置（地 + 生物）</button>
            <button type="button" class="lab-btn lab-btn-danger" id="labWipeBtn">消灭所有生物</button>
            <button type="button" class="lab-btn lab-btn-muted" id="labManaSelfBtn">恢复我方法力</button>
            <button type="button" class="lab-btn lab-btn-muted" id="labManaAllBtn">双方恢复法力</button>
            <p class="lab-hint">法力恢复为测试用满值。清场会将场上生物置入墓地。清空手牌会把手牌移入墓地。</p>
          </section>
        </div>
      </div>
    </aside>

    <main class="testing-canvas-wrap">
      <canvas id="myCanvas" tabindex="0"></canvas>
    </main>
  </div>

  <script src="webpages/testing_area/testing_panel.js"></script>
  <script src="webpages/testing_area/testing_start.js"></script>
</body>
</html>
